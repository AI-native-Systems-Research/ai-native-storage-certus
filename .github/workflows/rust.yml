name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
        run:
          dnf install -y rust cargo gcc  # Basic Rust toolchain
          dnf install -y openssl-devel # Example for projects with C dependencies
          rustup toolchain install nightly-2025-12-11

    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
