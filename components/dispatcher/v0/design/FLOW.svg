<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <linearGradient id="gpu-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="staging-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="ssd-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
    <linearGradient id="dm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Dispatcher v0 — Data Flow</text>

  <!-- Legend -->
  <g transform="translate(30, 55)">
    <rect width="240" height="80" fill="white" stroke="#e2e8f0" rx="6"/>
    <text x="12" y="18" font-size="11" font-weight="600" fill="#475569">Legend</text>
    <line x1="12" y1="32" x2="45" y2="32" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text x="52" y="36" font-size="10" fill="#334155">Populate (GPU -> SSD)</text>
    <line x1="12" y1="50" x2="45" y2="50" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text x="52" y="54" font-size="10" fill="#334155">Lookup (SSD -> GPU)</text>
    <line x1="12" y1="68" x2="45" y2="68" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
    <text x="52" y="72" font-size="10" fill="#334155">Prepare/Commit Store (Direct)</text>
  </g>

  <!-- ============================================================ -->
  <!-- CLIENT / GPU ROW -->
  <!-- ============================================================ -->
  <g transform="translate(80, 160)">
    <rect width="200" height="60" fill="url(#gpu-grad)" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <text x="100" y="25" text-anchor="middle" font-weight="600" fill="#1e40af" font-size="13">Client GPU Memory</text>
    <text x="100" y="43" text-anchor="middle" font-size="10" fill="#1e40af">IpcHandle { address, size }</text>
  </g>

  <g transform="translate(820, 160)">
    <rect width="200" height="60" fill="white" stroke="#64748b" stroke-width="1.5" rx="8"/>
    <text x="100" y="25" text-anchor="middle" font-weight="600" fill="#334155" font-size="13">Caller (Direct Path)</text>
    <text x="100" y="43" text-anchor="middle" font-size="10" fill="#64748b">prepare_store / commit_store</text>
  </g>

  <!-- ============================================================ -->
  <!-- DISPATCHER BOX -->
  <!-- ============================================================ -->
  <rect x="40" y="270" width="1020" height="380" fill="white" stroke="#94a3b8" stroke-width="1.5" rx="10" stroke-dasharray="6 3"/>
  <text x="60" y="295" font-size="13" font-weight="700" fill="#475569">DispatcherComponentV0</text>

  <!-- IGpuServices -->
  <g transform="translate(80, 310)">
    <rect width="200" height="50" fill="#f0f9ff" stroke="#93c5fd" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-weight="600" fill="#1d4ed8" font-size="11">IGpuServices</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#3b82f6">dma_copy_to_host / to_device</text>
  </g>

  <!-- Dispatch Map -->
  <g transform="translate(440, 310)">
    <rect width="220" height="50" fill="url(#dm-grad)" stroke="#8b5cf6" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-weight="600" fill="#5b21b6" font-size="11">IDispatchMap</text>
    <text x="110" y="38" text-anchor="middle" font-size="9" fill="#6d28d9">create_staging / lookup / convert_to_storage</text>
  </g>

  <!-- Staging Buffer -->
  <g transform="translate(130, 400)">
    <rect width="180" height="50" fill="url(#staging-grad)" stroke="#d97706" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="600" fill="#92400e" font-size="11">DMA Staging Buffer</text>
    <text x="90" y="38" text-anchor="middle" font-size="9" fill="#a16207">SPDK DMA memory</text>
  </g>

  <!-- DMA Buffer (prepare_store) -->
  <g transform="translate(790, 400)">
    <rect width="180" height="50" fill="url(#staging-grad)" stroke="#7c3aed" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="600" fill="#5b21b6" font-size="11">DMA Buffer</text>
    <text x="90" y="38" text-anchor="middle" font-size="9" fill="#6d28d9">Caller-writable (prepare_store)</text>
  </g>

  <!-- Background Writer -->
  <g transform="translate(130, 490)">
    <rect width="180" height="50" fill="#fff1f2" stroke="#f43f5e" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="600" fill="#be123c" font-size="11">BackgroundWriter</text>
    <text x="90" y="38" text-anchor="middle" font-size="9" fill="#e11d48">Async worker thread</text>
  </g>

  <!-- Extent Manager -->
  <g transform="translate(440, 490)">
    <rect width="220" height="50" fill="#f0fdf4" stroke="#22c55e" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-weight="600" fill="#166534" font-size="11">IExtentManager (per drive)</text>
    <text x="110" y="38" text-anchor="middle" font-size="9" fill="#15803d">reserve_extent / publish / remove_extent</text>
  </g>

  <!-- I/O Segmenter -->
  <g transform="translate(440, 570)">
    <rect width="220" height="45" fill="#f8fafc" stroke="#64748b" rx="6"/>
    <text x="110" y="20" text-anchor="middle" font-weight="600" fill="#334155" font-size="11">io_segmenter</text>
    <text x="110" y="36" text-anchor="middle" font-size="9" fill="#64748b">MDTS-aware segmented I/O (128 KiB chunks)</text>
  </g>

  <!-- write_buffer_to_ssd -->
  <g transform="translate(790, 510)">
    <rect width="180" height="40" fill="#f8fafc" stroke="#64748b" rx="6"/>
    <text x="90" y="16" text-anchor="middle" font-weight="600" fill="#334155" font-size="11">write_buffer_to_ssd</text>
    <text x="90" y="32" text-anchor="middle" font-size="9" fill="#64748b">Shared write helper</text>
  </g>

  <!-- ============================================================ -->
  <!-- NVMe SSD ROW -->
  <!-- ============================================================ -->
  <g transform="translate(340, 700)">
    <rect width="420" height="60" fill="url(#ssd-grad)" stroke="#16a34a" stroke-width="1.5" rx="8"/>
    <text x="210" y="25" text-anchor="middle" font-weight="700" fill="#166534" font-size="14">NVMe SSD (Block Device via SPDK)</text>
    <text x="210" y="43" text-anchor="middle" font-size="10" fill="#15803d">Drive[key % N] — IBlockDevice (WriteSync / ReadSync)</text>
  </g>

  <!-- ============================================================ -->
  <!-- POPULATE PATH (Blue arrows) -->
  <!-- ============================================================ -->

  <!-- GPU -> IGpuServices (dma_copy_to_host) -->
  <line x1="180" y1="220" x2="180" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="120" y="265" font-size="9" fill="#2563eb" font-weight="500">dma_copy_to_host</text>

  <!-- IGpuServices -> Staging Buffer -->
  <line x1="180" y1="360" x2="200" y2="398" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Staging -> Background Writer -->
  <line x1="220" y1="450" x2="220" y2="488" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="228" y="472" font-size="9" fill="#2563eb" font-weight="500">enqueue WriteJob</text>

  <!-- Background Writer -> Extent Manager -->
  <line x1="310" y1="515" x2="438" y2="515" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="345" y="508" font-size="9" fill="#2563eb" font-weight="500">reserve_extent</text>

  <!-- Background Writer -> SSD (via segmenter) -->
  <path d="M 220 540 L 220 592 Q 220 610 240 610 L 440 610" stroke="#2563eb" stroke-width="2" fill="none"/>
  <line x1="440" y1="610" x2="440" y2="615" stroke="#2563eb" stroke-width="2"/>
  <line x1="440" y1="615" x2="490" y2="698" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="240" y="598" font-size="9" fill="#2563eb" font-weight="500">segmented write</text>

  <!-- Background Writer -> Dispatch Map (convert_to_storage) -->
  <path d="M 310 500 Q 380 480 440 380 L 480 362" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow-blue)"/>
  <text x="370" y="440" font-size="8" fill="#2563eb">convert_to_storage</text>

  <!-- ============================================================ -->
  <!-- LOOKUP PATH (Green arrows) -->
  <!-- ============================================================ -->

  <!-- SSD -> read_from_block_device -> IGpuServices -> GPU -->
  <line x1="600" y1="700" x2="600" y2="617" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="608" y="665" font-size="9" fill="#16a34a" font-weight="500">segmented read</text>

  <path d="M 600 570 L 600 370 Q 600 350 500 345 L 282 340" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="500" y="388" font-size="9" fill="#16a34a" font-weight="500">reassemble</text>

  <!-- IGpuServices -> GPU -->
  <line x1="150" y1="310" x2="150" y2="222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="90" y="265" font-size="9" fill="#16a34a" font-weight="500">dma_copy_to_device</text>

  <!-- Staging direct path (cache hit) -->
  <path d="M 260 400 Q 280 380 280 360 L 270 362" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <text x="282" y="385" font-size="8" fill="#16a34a">staging hit (no SSD)</text>

  <!-- ============================================================ -->
  <!-- PREPARE/COMMIT PATH (Purple arrows) -->
  <!-- ============================================================ -->

  <!-- Caller -> DMA Buffer -->
  <line x1="920" y1="220" x2="895" y2="398" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="925" y="300" font-size="9" fill="#7c3aed" font-weight="500">prepare_store()</text>
  <text x="925" y="315" font-size="9" fill="#7c3aed" font-weight="500">returns DMA buf</text>

  <!-- DMA Buffer -> write_buffer_to_ssd -->
  <line x1="880" y1="450" x2="880" y2="508" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="888" y="482" font-size="9" fill="#7c3aed" font-weight="500">commit_store()</text>

  <!-- write_buffer_to_ssd -> io_segmenter -->
  <line x1="790" y1="535" x2="662" y2="575" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="4 2"/>

  <!-- write_buffer_to_ssd -> SSD -->
  <line x1="880" y1="550" x2="700" y2="698" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="810" y="630" font-size="9" fill="#7c3aed" font-weight="500">segmented write</text>

  <!-- Extent manager connection from prepare path -->
  <path d="M 790 425 Q 720 440 662 490 L 662 495" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow-purple)"/>
  <text x="700" y="455" font-size="8" fill="#7c3aed">reserve_extent (at prepare)</text>

  <!-- publish annotation -->
  <text x="700" y="700" font-size="9" fill="#334155" font-style="italic">publish() on success / drop = abort on cancel</text>

  <!-- Drive selection annotation -->
  <g transform="translate(780, 720)">
    <rect width="250" height="35" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
    <text x="125" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Drive Selection</text>
    <text x="125" y="29" text-anchor="middle" font-size="10" fill="#64748b" font-family="monospace">drive_idx = key % num_drives</text>
  </g>

  <!-- Eviction annotation -->
  <g transform="translate(700, 310)">
    <rect width="210" height="50" fill="#fef2f2" stroke="#fca5a5" rx="6"/>
    <text x="105" y="20" text-anchor="middle" font-weight="600" fill="#991b1b" font-size="10">Eviction (before prepare_store)</text>
    <text x="105" y="35" text-anchor="middle" font-size="9" fill="#b91c1c">if entries > watermark (80%):</text>
    <text x="105" y="46" text-anchor="middle" font-size="9" fill="#b91c1c">remove oldest until at watermark</text>
  </g>
</svg>
